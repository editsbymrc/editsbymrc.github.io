<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mein Shooting | editsbymrc.</title>
    <link rel="stylesheet" href="css/style.css?v=2.4">
</head>

<body oncontextmenu="return false;">

<canvas id="particle-canvas"></canvas>

<header class="glass-nav">
    <div class="nav-container">
        <div class="logo">
            <h1>editsbymrc.</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Startseite</a></li>
                <li><a href="galerie.html" class="active">Mein Shooting</a></li>
            </ul>
        </nav>
    </div>
</header>

<main>
    <section class="hero framer-reveal" style="min-height: 80vh; display: flex; flex-direction: column; justify-content: center; padding-top: 150px;">

        <h1 class="blur-reveal" style="font-size: 3rem;">Dein privates <span class="accent-text">Shooting.</span></h1>
        <p style="font-size: 1.15rem; color: #888; margin-bottom: 40px;">Exklusiver Zugang zu deinem Shooting.</p>

        <div class="service-card framer-reveal" style="max-width: 500px; width: 100%; margin: 0 auto; text-align: left; background: rgba(17, 17, 17, 0.7); backdrop-filter: blur(10px);">
            <h3 style="font-size: 1.5rem; margin-bottom: 15px; color: #fff; text-align: center;"> Kundenlogin</h3>
            <p style="color: #aaa; font-size: 1rem; line-height: 1.6; margin-bottom: 30px; text-align: center;">
                Gib hier deinen persönlichen Code ein, um auf deine Bilder zuzugreifen.
            </p>

            <div class="premium-login-wrapper">
                <input type="text" id="shootingCode" class="premium-login-input" placeholder="Z.B. C63-Marcel" onkeypress="handleEnter(event)" autocomplete="off">
                <button onclick="openGallery()" class="premium-login-btn">Galerie öffnen</button>
            </div>

            <p id="error-msg" style="color: #ff4444; font-size: 0.9rem; margin-top: 15px; display: none; text-align: center;">Bitte gib einen gültigen Code ein.</p>
        </div>

    </section>
</main>

<footer style="position: absolute; bottom: 0; width: 100%; border-top: 1px solid rgba(255, 255, 255, 0.05);">
    <p style="padding: 20px; text-align: center; color: #555; font-size: 0.85rem; margin: 0;">&copy; 2026 editsbymrc. Alle Rechte vorbehalten.</p>
</footer>

<script>
    // --- KUNDEN-LOGIN REDIRECT FUNKTION ---
    function openGallery() {
        const code = document.getElementById('shootingCode').value.trim();
        const errorMsg = document.getElementById('error-msg');

        if(code === "") {
            errorMsg.style.display = "block";
            document.getElementById('shootingCode').style.borderColor = "#ff4444";
        } else {
            errorMsg.style.display = "none";
            // Leitet auf den eingegebenen Code + .html weiter
            window.location.href = code + ".html";
        }
    }

    function handleEnter(e) {
        if(e.key === 'Enter') {
            openGallery();
        }
    }

    // --- Einfliegen der Elemente (Framer Reveal) ---
    document.addEventListener("DOMContentLoaded", function() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('framer-show');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.framer-reveal').forEach((el) => {
            observer.observe(el);
        });
    });

    // --- Blur-Effekt der Überschrift ---
    document.addEventListener("DOMContentLoaded", function() {
        const blurText = document.querySelector('.blur-reveal');
        if (blurText) {
            const makeSharp = () => {
                blurText.classList.add('focused');
            };
            window.addEventListener('mousemove', makeSharp, { once: true });
            window.addEventListener('touchstart', makeSharp, { once: true });
            setTimeout(makeSharp, 1000);
        }
    });

    // --- Partikel-Hintergrund ---
    document.addEventListener("DOMContentLoaded", function() {
        const canvas = document.getElementById('particle-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        let particlesArray = [];

        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        setCanvasSize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.2 + 0.3;
                this.speedX = Math.random() * 0.3 - 0.15;
                this.speedY = Math.random() * 0.3 - 0.15;
                this.angle = Math.random() * Math.PI * 2;
                this.pulseSpeed = Math.random() * 0.015 + 0.005;
                this.opacity = 0;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;

                this.angle += this.pulseSpeed;
                this.opacity = (Math.sin(this.angle) * 0.35) + 0.45;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(18, 89, 243, ${this.opacity})`;
                ctx.shadowBlur = 15 * this.opacity;
                ctx.shadowColor = `rgba(18, 89, 243, ${this.opacity})`;
                ctx.fill();
            }
        }

        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 12000;

            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            setCanvasSize();
            init();
        });
    });
</script>

</body>
</html>
