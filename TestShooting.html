<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Protected Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            .staticrypt-hr {
                margin-top: 20px;
                margin-bottom: 20px;
                border: 0;
                border-top: 1px solid #333;
            }

            .staticrypt-page {
                width: 360px;
                padding: 8% 0 0;
                margin: auto;
                box-sizing: border-box;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: #151515; /* Edle dunkle Box */
                color: #ffffff; /* Weiße Schrift */
                max-width: 360px;
                margin: 0 auto 100px;
                padding: 45px;
                text-align: center;
                box-shadow: 0 10px 30px 0 rgba(0, 0, 0, 0.7); /* Cooler Schatten */
                border-radius: 8px; /* Leicht abgerundet */
                border: 1px solid #222;
            }

            .staticrypt-form input[type="password"],
            input[type="text"] {
                background: inherit;
                border: 0;
                box-sizing: border-box;
                font-size: 14px;
                outline: 0;
                padding: 15px 30px 15px 15px;
                width: 100%;
                color: #ffffff; /* Weiße Schrift beim Tippen */
                font-family: 'Helvetica Neue', Arial, sans-serif;
            }

            .staticrypt-password-container {
                position: relative;
                outline: 0;
                background: #222; /* Dunkles Eingabefeld */
                width: 100%;
                border: 1px solid #333;
                border-radius: 5px;
                margin: 0 0 15px;
                box-sizing: border-box;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                opacity: 60%;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
                filter: invert(1); /* Macht das schwarze Auge-Icon weiß! */
            }

            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                outline: 0;
                background: #1259f3; /* Dein Signatur-Blau */
                width: 100%;
                border: 0;
                border-radius: 5px;
                padding: 15px;
                color: #ffffff;
                font-size: 14px;
                font-weight: bold;
                letter-spacing: 1px;
                cursor: pointer;
                transition: background-color 0.3s ease, transform 0.2s ease;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: #0d44c4; /* Dein dunkleres Hover-Blau */
                transform: translateY(-2px);
            }

            .staticrypt-html {
                height: 100%;
                background: #121212;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
                background: #121212;
            }

            .staticrypt-content {
                height: 100%;
                margin-bottom: 1em;
                background: #121212; /* Weg mit dem Grün! */
                font-family: 'Helvetica Neue', Arial, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-instructions {
                margin-top: -1em;
                margin-bottom: 1em;
            }

            .staticrypt-title {
                font-size: 1.5em;
                font-weight: bold;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 1em;
                color: #aaaaaa;
                font-size: 14px;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.2);
                margin-right: 1em;
                accent-color: #1259f3; /* Macht den Haken bei "Remember me" blau */
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #121212;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid #1259f3; /* Blauer Ladekreis */
                border-right-color: transparent;
                border-radius: 50%;
                -webkit-animation: spinner-border 0.75s linear infinite;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>

    <body class="staticrypt-body">
        <div id="staticrypt_loading" class="staticrypt-spinner-container">
            <div class="staticrypt-spinner"></div>
        </div>

        <div id="staticrypt_content" class="staticrypt-content hidden">
            <div class="staticrypt-page">

                            Remember me

                        <input type="submit" class="staticrypt-decrypt-button" value="DECRYPT" />
                    </form>
                </div>
            </div>
        </div>
