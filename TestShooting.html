<!DOCTYPE html>
<html class="staticrypt-html">
<head>
    <meta charset="utf-8" />
    <title>Kunden-Login | editsbymrc.</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta http-equiv="cache-control" content="max-age=0" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
    <meta http-equiv="pragma" content="no-cache" />

    <style>
        /* --- NEUES PREMIUM DESIGN --- */
        .staticrypt-hr {
            margin-top: 20px;
            margin-bottom: 20px;
            border: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .staticrypt-page {
            width: 400px;
            padding: 10% 0 0;
            margin: auto;
            box-sizing: border-box;
            max-width: 90%;
        }

        /* Die Login-Box jetzt im "Glas"-Look wie die Galerie! */
        .staticrypt-form {
            position: relative;
            z-index: 1;
            background: rgba(17, 17, 17, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #ffffff;
            margin: 0 auto 100px;
            padding: 45px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .staticrypt-form input[type="password"],
        input[type="text"] {
            background: inherit;
            border: 0;
            box-sizing: border-box;
            font-size: 14px;
            outline: 0;
            padding: 15px 30px 15px 15px;
            width: 100%;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .staticrypt-password-container {
            position: relative;
            outline: 0;
            background: rgba(0, 0, 0, 0.6);
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            margin: 0 0 15px;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .staticrypt-password-container:focus-within {
            border-color: #1259f3;
            box-shadow: 0 0 15px rgba(18, 89, 243, 0.3);
        }

        .staticrypt-toggle-password-visibility {
            cursor: pointer;
            height: 20px;
            opacity: 60%;
            padding: 13px;
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            filter: invert(1);
        }

        .staticrypt-form .staticrypt-decrypt-button {
            outline: 0;
            background: #1259f3;
            width: 100%;
            border: 0;
            border-radius: 8px;
            padding: 15px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .staticrypt-form .staticrypt-decrypt-button:hover,
        .staticrypt-form .staticrypt-decrypt-button:focus {
            background: #0d46c4;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(18, 89, 243, 0.6);
        }

        /* Das tiefe Schwarz für die Seite, Partikel schweben drüber */
        .staticrypt-html, .staticrypt-body, .staticrypt-content, .staticrypt-spinner-container {
            height: 100%;
            margin: 0;
            background: #050505;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .staticrypt-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .staticrypt-subtitle {
            font-size: 0.95rem;
            color: #888;
            margin-bottom: 1em;
        }

        label.staticrypt-remember {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5em;
            color: #888;
            font-size: 14px;
            cursor: pointer;
        }

        .staticrypt-remember input[type="checkbox"] {
            transform: scale(1.2);
            margin-right: 10px;
            accent-color: #1259f3;
        }

        .hidden { display: none !important; }

        .staticrypt-spinner {
            display: inline-block;
            width: 2rem;
            height: 2rem;
            border: 0.25em solid #1259f3;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spinner-border 0.75s linear infinite;
        }

        @keyframes spinner-border {
            100% { transform: rotate(360deg); }
        }

        /* HINTERGRUND-PARTIKEL FIX */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>

    const canvas = document.getElementById('particle-canvas');

        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.2 + 0.3;
                this.speedX = Math.random() * 0.3 - 0.15;

            }

                this.x += this.speedX; this.y += this.speedY;
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
                this.angle += this.pulseSpeed;
                this.opacity = (Math.sin(this.angle) * 0.35) + 0.45;
            }

                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);

                ctx.shadowColor = `rgba(18, 89, 243, ${this.opacity})`;
                ctx.fill();
            }
        }

        }

            }

        }
