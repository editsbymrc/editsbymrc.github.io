<script>
  // 1. Framer Reveal (Einfliegen)
  document.addEventListener("DOMContentLoaded", function() {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('framer-show');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.framer-reveal').forEach((el) => { observer.observe(el); });
  });

  // 2. Blur Reveal (Titel Scharfstellen)
  document.addEventListener("DOMContentLoaded", function() {
    const blurText = document.querySelector('.blur-reveal');
    if (blurText) {
      const makeSharp = () => { blurText.classList.add('focused'); };
      window.addEventListener('mousemove', makeSharp, { once: true });
      window.addEventListener('touchstart', makeSharp, { once: true });
      setTimeout(makeSharp, 1000);
    }
  });

  // 3. Lightbox Funktion (Bilder vergrößern - GEFIXT FÜR DEN CARD STACK)
  document.addEventListener("DOMContentLoaded", function() {
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const closeBtn = document.querySelector('.lightbox-close');
    const galleryImages = document.querySelectorAll('.card-stack-item img'); // <-- HIER WAR DER FEHLER!

    galleryImages.forEach(img => {
      img.addEventListener('click', function() {
        lightboxImg.src = this.src;
        lightbox.classList.add('active');
      });
    });

    closeBtn.addEventListener('click', function() { lightbox.classList.remove('active'); });
    lightbox.addEventListener('click', function(e) {
      if (e.target !== lightboxImg) { lightbox.classList.remove('active'); }
    });
  });

  // 4. Partikel Hintergrund
  document.addEventListener("DOMContentLoaded", function() {
    const canvas = document.getElementById('particle-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    let particlesArray = [];

    function setCanvasSize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    setCanvasSize();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 1.2 + 0.3;
        this.speedX = Math.random() * 0.3 - 0.15;
        this.speedY = Math.random() * 0.3 - 0.15;
        this.angle = Math.random() * Math.PI * 2;
        this.pulseSpeed = Math.random() * 0.015 + 0.005;
        this.opacity = 0;
      }
      update() {
        this.x += this.speedX; this.y += this.speedY;
        if (this.x < 0) this.x = canvas.width;
        if (this.x > canvas.width) this.x = 0;
        if (this.y < 0) this.y = canvas.height;
        if (this.y > canvas.height) this.y = 0;
        this.angle += this.pulseSpeed;
        this.opacity = (Math.sin(this.angle) * 0.35) + 0.45;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(18, 89, 243, ${this.opacity})`;
        ctx.shadowBlur = 15 * this.opacity;
        ctx.shadowColor = `rgba(18, 89, 243, ${this.opacity})`;
        ctx.fill();
      }
    }

    function init() {
      particlesArray = [];
      let numberOfParticles = (canvas.width * canvas.height) / 12000;
      for (let i = 0; i < numberOfParticles; i++) { particlesArray.push(new Particle()); }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
        particlesArray[i].draw();
      }
      requestAnimationFrame(animate);
    }

    init();
    animate();
    window.addEventListener('resize', () => { setCanvasSize(); init(); });
  });
</script>

<script>
  // --- PREMIUM BUCHSTABEN-ANIMATION (KUNDEN-TEMPLATE) ---
  document.addEventListener("DOMContentLoaded", function() {
    const container = document.getElementById('client-animated-text');
    if (!container) return;

    // Hier legst du deinen Text fest
    const text1 = "BMW ";
    const text2 = "M5.";
    let delay = 0;

    function processText(text) {
      return text.split(" ").map(word => {
        let wordHtml = `<span style="white-space: nowrap;">`;
        for (let char of word) {
          wordHtml += `<span class="char" style="animation-delay: ${delay}s">${char}</span>`;
          delay += 0.035; // Geschwindigkeit der Buchstaben
        }
        wordHtml += `</span>`;
        return wordHtml;
      }).join(" ");
    }

    // Baut den Text zusammen und färbt "Shooting." blau ein
    container.innerHTML = processText(text1) + " <span class='accent-text'>" + processText(text2) + "</span>";
  });
</script>
